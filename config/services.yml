services:
    uflagmey.forumtree.controller:
        class: uflagmey\forumtree\controller\main
        arguments:
            - '@auth'
            - '@dbal.conn'
            - '@controller.helper'
            - '@language'
            - '@request'
            - '@template'
            - '@user'
            - '%core.table_prefix%forums'

    uflagmey.forumtree.listener:
        class: uflagmey\forumtree\event\main_listener
        arguments:
            - '@controller.helper'
            - '@language'
            - '@template'
        tags:
            - { name: event.listener }
