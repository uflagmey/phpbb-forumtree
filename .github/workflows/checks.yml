name: phpBB Extension Checks

on:
  push:
    branches: [ main ]
    tags: [ '*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  composer:
    name: Composer validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
      - name: Validate composer.json
        run: composer validate --no-check-publish --no-check-all

  epv:
    name: Extension Pre Validator
    runs-on: ubuntu-latest
    steps:
      - name: Checkout into ext/uflagmey/forumtree
        uses: actions/checkout@v4
        with:
          path: ext/uflagmey/forumtree
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
      - name: Install EPV
        run: composer global require phpbb/epv:dev-master --no-interaction
      - name: Run EPV
        run: $(composer global config home --quiet)/vendor/bin/EPV.php run --dir="ext/uflagmey/forumtree"

  variable-analysis:
    name: VariableAnalysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer, phpcs
      - name: Install VariableAnalysis ruleset
        run: composer global require sirbrillig/phpcs-variable-analysis --no-interaction
      - name: Register VariableAnalysis with phpcs
        run: phpcs --config-set installed_paths $(composer global config home --quiet)/vendor/sirbrillig/phpcs-variable-analysis
      - name: Run VariableAnalysis
        run: phpcs -p --standard=VariableAnalysis --extensions=php --ignore=vendor/,language/,.github/ .

  phpcompat:
    name: PHPCompatibility (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.1', '7.2', '7.3', '7.4', '8.0', '8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer, phpcs
      - name: Install PHPCompatibility ruleset
        run: composer global require phpcompatibility/php-compatibility --no-interaction
      - name: Register PHPCompatibility with phpcs
        run: phpcs --config-set installed_paths $(composer global config home --quiet)/vendor/phpcompatibility/php-compatibility
      - name: Run PHPCompatibility (testVersion ${{ matrix.php }})
        run: phpcs -p --standard=PHPCompatibility --runtime-set testVersion ${{ matrix.php }} --extensions=php --ignore=vendor/,.github/ .
